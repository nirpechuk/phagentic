

      <!-- RUNS -->
      <sc-if value="{{ panels.runs.open }}" hint-placeholder-val="{{ false }}">
      <div onMouseDownCapture="{{ panels.runs.front }}" style="position:absolute; left:0; top:0; width:{{ panels.runs.w }}; height:{{ panels.runs.h }}; transform:{{ panels.runs.tf }}; z-index:{{ panels.runs.z }}; border-radius:20px; background:linear-gradient(150deg, rgba(254,251,246,.74), rgba(247,242,233,.52)); -webkit-backdrop-filter:blur(15px) saturate(1.3); backdrop-filter:blur(15px) saturate(1.3); border:1px solid rgba(255,255,255,.64); box-shadow:0 26px 54px -28px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.88); display:flex; flex-direction:column; overflow:hidden; transition:{{ animTrans }};">
        <div onMouseDown="{{ panels.runs.resize }}" title="drag to resize" style="position:absolute; right:2px; bottom:2px; width:18px; height:18px; cursor:nwse-resize; z-index:6; border-right:2px solid rgba(59,55,47,.3); border-bottom:2px solid rgba(59,55,47,.3); border-bottom-right-radius:8px;"></div>
        <div onMouseDown="{{ dragH.runs }}" style="cursor:grab; padding:13px 18px 9px; display:flex; align-items:center; justify-content:space-between;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.18em; color:rgba(46,43,36,.55);">RUNS</span>
          <button onMouseDown="{{ stopProp }}" onClick="{{ closeH.runs }}" title="close" style="position:absolute; top:11px; right:13px; z-index:8; cursor:pointer; display:flex; align-items:center; justify-content:center; width:23px; height:23px; padding:0; border-radius:50%; background:rgba(59,55,47,.05); border:1px solid rgba(59,55,47,.12); color:rgba(46,43,36,.45); font-size:14px; line-height:1; transition:background .15s, color .15s, border-color .15s;" style-hover="background:rgba(59,55,47,.13); color:#2e2b24; border-color:rgba(59,55,47,.24);">×</button>
        </div>
        <div style="flex:1; min-height:0; overflow-y:auto; padding:6px 16px 14px; display:flex; flex-direction:column; gap:9px;">
          <!-- current run editor -->
          <div style="display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:12px; background:{{ glowColor2 }}; border:1px solid rgba(59,55,47,.12);">
            <button onMouseDown="{{ stopProp }}" onClick="{{ openColor }}" title="choose run colour" style="cursor:pointer; flex:none; width:26px; height:26px; border-radius:50%; border:1px solid rgba(0,0,0,.15); background:{{ runColorVal }}; box-shadow:0 0 8px {{ runColorVal }}, inset 0 1px 2px rgba(255,255,255,.5);"></button>
            <input value="{{ runNameTxt }}" onMouseDown="{{ stopProp }}" onInput="{{ setRunName }}" placeholder="Run name" style="flex:1; min-width:0; background:rgba(255,255,255,.5); border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:7px 9px; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:#2e2b24; outline:none;" />
            <button onMouseDown="{{ stopProp }}" onClick="{{ addRun }}" title="log this run and start a new one" style="cursor:pointer; background:#6f8466; border:none; border-radius:8px; padding:7px 11px; font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:600; color:#fbf8f2;" style-hover="background:#566e4b;">＋ new</button>
          </div>
          <!-- colour spectrum (muted to match the site) -->
          <sc-if value="{{ colorOpen }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex; flex-wrap:wrap; gap:6px; padding:9px; border-radius:11px; background:rgba(255,255,255,.4); border:1px solid rgba(59,55,47,.12);">
            <sc-for list="{{ colorSwatches }}" as="sw" hint-placeholder-count="12">
              <button onMouseDown="{{ stopProp }}" onClick="{{ sw.pick }}" style="cursor:pointer; width:22px; height:22px; border-radius:6px; border:1px solid rgba(0,0,0,.12); background:{{ sw.hex }};" style-hover="transform:scale(1.15);"></button>
            </sc-for>
          </div>
          </sc-if>
          <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em; color:rgba(46,43,36,.45); margin-top:2px;">LOGGED RUNS</div>
          <sc-if value="{{ runsEmpty }}" hint-placeholder-val="{{ true }}">
          <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.4); padding:4px 2px;">No runs logged yet — hit ＋ new.</div>
          </sc-if>
          <sc-for list="{{ runsList }}" as="r" hint-placeholder-count="4">
            <div style="display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:11px; background:rgba(255,255,255,.3); border:1px solid rgba(59,55,47,.1);">
              <span style="flex:none; width:14px; height:14px; border-radius:50%; border:1px solid rgba(0,0,0,.12); background:{{ r.color }};"></span>
              <span style="flex:1; font-family:'JetBrains Mono',monospace; font-size:13px; color:#2e2b24;">{{ r.label }}</span>
              <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#94762f;">{{ r.sub }}</span>
              <button onMouseDown="{{ stopProp }}" onClick="{{ r.del }}" title="delete run" style="cursor:pointer; flex:none; background:none; border:none; color:rgba(46,43,36,.4); font-size:15px; line-height:1; padding:0 2px;" style-hover="color:#9c4a3c;">×</button>
            </div>
          </sc-for>
        </div>
      </div>
      </sc-if>
