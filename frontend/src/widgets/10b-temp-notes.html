
      <!-- TEMP NOTES -->
      <sc-if value="{{ panels.notes.open }}" hint-placeholder-val="{{ false }}">
      <div onMouseDownCapture="{{ panels.notes.front }}" style="position:absolute; left:0; top:0; width:{{ panels.notes.w }}; height:{{ panels.notes.h }}; transform:{{ panels.notes.tf }}; z-index:{{ panels.notes.z }}; border-radius:20px; background:linear-gradient(150deg, rgba(254,251,246,.74), rgba(247,242,233,.52)); -webkit-backdrop-filter:blur(15px) saturate(1.3); backdrop-filter:blur(15px) saturate(1.3); border:1px solid rgba(255,255,255,.64); box-shadow:0 26px 54px -28px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.88); display:flex; flex-direction:column; overflow:hidden; transition:{{ animTrans }};">
        <div onMouseDown="{{ panels.notes.resize }}" title="drag to resize" style="position:absolute; right:2px; bottom:2px; width:18px; height:18px; cursor:nwse-resize; z-index:6; border-right:2px solid rgba(59,55,47,.3); border-bottom:2px solid rgba(59,55,47,.3); border-bottom-right-radius:8px;"></div>
        <div onMouseDown="{{ dragH.notes }}" style="cursor:grab; padding:13px 18px 9px; display:flex; align-items:center; justify-content:space-between;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.18em; color:rgba(46,43,36,.55);">TEMP NOTES</span>
          <button onMouseDown="{{ stopProp }}" onClick="{{ closeH.notes }}" title="close" style="position:absolute; top:11px; right:13px; z-index:8; cursor:pointer; display:flex; align-items:center; justify-content:center; width:23px; height:23px; padding:0; border-radius:50%; background:rgba(59,55,47,.05); border:1px solid rgba(59,55,47,.12); color:rgba(46,43,36,.45); font-size:14px; line-height:1; transition:background .15s, color .15s, border-color .15s;" style-hover="background:rgba(59,55,47,.13); color:#2e2b24; border-color:rgba(59,55,47,.24);">×</button>
        </div>
        <div style="flex:1; min-height:0; display:flex; flex-direction:column; padding:4px 16px 16px;">
          <div style="font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#94762f; background:rgba(148,118,47,.1); border:1px solid rgba(148,118,47,.25); border-radius:8px; padding:6px 9px; margin-bottom:9px; line-height:1.45;">⚠ Temporary — these notes live only while this page is open and clear on reload.</div>
          <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:9px;">
            <sc-for list="{{ noteTabs }}" as="nt" hint-placeholder-count="3">
              <div style="display:flex; align-items:center; background:{{ nt.bg }}; border:1px solid {{ nt.border }}; border-radius:8px; overflow:hidden;">
                <button onMouseDown="{{ stopProp }}" onClick="{{ nt.sel }}" style="cursor:pointer; background:none; border:none; padding:5px 9px; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:{{ nt.color }}; max-width:120px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">{{ nt.title }}</button>
                <button onMouseDown="{{ stopProp }}" onClick="{{ nt.del }}" title="delete note" style="cursor:pointer; background:none; border:none; padding:5px 7px 5px 0; font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.35);" style-hover="color:#9c4a3c;">×</button>
              </div>
            </sc-for>
            <button onMouseDown="{{ stopProp }}" onClick="{{ newNote }}" style="cursor:pointer; background:rgba(111,132,102,.14); border:1px solid rgba(111,132,102,.3); border-radius:8px; padding:5px 10px; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#566e4b;" style-hover="background:rgba(111,132,102,.24);">＋ new</button>
          </div>
          <input value="{{ noteTitle }}" onMouseDown="{{ stopProp }}" onInput="{{ setNoteTitle }}" placeholder="Note title" style="background:rgba(255,255,255,.5); border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:8px 10px; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:#2e2b24; outline:none; margin-bottom:8px;" />
          <textarea value="{{ noteBody }}" onMouseDown="{{ stopProp }}" onInput="{{ setNoteBody }}" placeholder="Jot something down…" style="flex:1; min-height:0; resize:none; background:rgba(255,255,255,.45); border:1px solid rgba(59,55,47,.2); border-radius:10px; padding:10px 12px; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.55; color:#2e2b24; outline:none;"></textarea>
        </div>
      </div>
      </sc-if>
