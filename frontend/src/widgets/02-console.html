

  <!-- CONSOLE -->
  <div style="position:absolute; inset:0; display:flex; flex-direction:column; opacity:{{ consoleOpacity }}; pointer-events:{{ consolePE }}; transition:opacity .9s ease;">

    <header style="display:flex; align-items:center; justify-content:space-between; padding:15px 30px; border-bottom:1px solid rgba(59,55,47,.16); background:linear-gradient(rgba(247,243,235,.55),rgba(244,238,228,.32)); -webkit-backdrop-filter:blur(9px); backdrop-filter:blur(9px);">
      <div style="display:flex; align-items:center; gap:15px;">
        <div onClick="{{ goHome }}" title="live sensor colour — back to home" style="cursor:pointer; width:26px; height:26px; border-radius:7px; background:{{ vesselColor }}; border:1px solid rgba(59,55,47,.28); box-shadow:inset 0 1px 3px rgba(255,255,255,.6); transition:background .12s linear;"></div>
        <div onClick="{{ goHome }}" title="back to home" style="cursor:pointer; font-weight:600; letter-spacing:.34em; font-size:15px; color:#2e2b24;">PHAGENTIC</div>
        <div style="font-family:'JetBrains Mono',monospace; font-size:13px; color:rgba(46,43,36,.55); letter-spacing:.05em; padding-left:15px; border-left:1px solid rgba(59,55,47,.2);">blue-bottle&nbsp;oscillation&nbsp;controller</div>
      </div>
      <div style="display:flex; align-items:center; gap:20px;">
        <div style="display:flex; align-items:center; gap:9px; font-family:'JetBrains Mono',monospace; font-size:14px; color:rgba(46,43,36,.72);">
          <span style="width:8px; height:8px; border-radius:50%; background:{{ statusDot }}; animation:pulse 2s ease-in-out infinite;"></span>{{ statusTxt }}&nbsp;·&nbsp;{{ runLabel2 }}&nbsp;·&nbsp;t&nbsp;{{ clockTxt }}&nbsp;·&nbsp;<span style="color:{{ sourceColor }};">{{ sourceTxt }}</span>
        </div>
        <div style="display:flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace;">
          <span style="font-size:11.5px; letter-spacing:.1em; color:rgba(46,43,36,.5); margin-right:3px;">TEXT</span>
          <button onClick="{{ zoomOut }}" title="Smaller" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; width:27px; height:27px; font:inherit; font-size:13.5px; color:#2e2b24;" style-hover="background:rgba(59,55,47,.08);">A−</button>
          <button onClick="{{ zoomReset }}" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; padding:0 9px; height:27px; font:inherit; font-size:13px; color:rgba(46,43,36,.72);" style-hover="background:rgba(59,55,47,.08);">{{ zoomTxt }}</button>
          <button onClick="{{ zoomIn }}" title="Larger" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; width:29px; height:27px; font:inherit; font-size:15px; color:#2e2b24;" style-hover="background:rgba(59,55,47,.08);">A+</button>
        </div>
        <button onClick="{{ bleConnect }}" title="Connect to the bioreactor over Bluetooth" style="cursor:pointer; background:none; border:none; border-bottom:1.5px solid rgba(111,132,102,.5); padding:4px 1px; font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:.05em; color:#566e4b;" style-hover="border-bottom-color:#2e2b24; color:#2e2b24;">{{ bleLabel }}</button>
        <button onClick="{{ tidyDesk }}" style="cursor:pointer; background:none; border:none; border-bottom:1.5px solid rgba(59,55,47,.4); padding:4px 1px; font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:.05em; color:rgba(46,43,36,.72);" style-hover="color:#2e2b24; border-bottom-color:#2e2b24;">✦ tidy desk</button>
        <div style="display:flex; align-items:center; gap:16px; font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:.05em;">
          <button onClick="{{ toggleRun }}" style="cursor:pointer; background:none; border:none; border-bottom:1.5px solid transparent; padding:4px 1px; font:inherit; color:rgba(46,43,36,.72);" style-hover="color:#2e2b24; border-bottom-color:rgba(59,55,47,.5);">{{ runLabel }}</button>
          <button onClick="{{ remelt }}" style="cursor:pointer; background:none; border:none; border-bottom:1.5px solid transparent; padding:4px 1px; font:inherit; color:rgba(46,43,36,.72);" style-hover="color:#2e2b24; border-bottom-color:rgba(59,55,47,.5);">restart</button>
          <button onClick="{{ bump }}" style="cursor:pointer; background:none; border:none; border-bottom:1.5px solid transparent; padding:4px 1px; font:inherit; color:#94762f;" style-hover="border-bottom-color:rgba(148,118,47,.6);">disturb</button>
          <span style="width:1px; height:16px; background:rgba(59,55,47,.22);"></span>
          <button onClick="{{ manualFire }}" style="cursor:pointer; background:none; border:none; padding:4px 1px; font:inherit; font-weight:700; letter-spacing:.14em; color:#566e4b; border-bottom:2px solid #6f8466;" style-hover="border-bottom-color:#2e2b24;">⟢ PULSE</button>
        </div>
        <button onClick="{{ openSettings }}" title="Bluetooth & settings" style="cursor:pointer; margin-left:4px; background:linear-gradient(150deg, rgba(247,243,235,.85), rgba(225,219,207,.7)); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border:1px solid rgba(59,55,47,.3); border-radius:9px; padding:8px 14px; font-family:'JetBrains Mono',monospace; font-size:13.5px; letter-spacing:.06em; color:#3b372f; box-shadow:0 4px 12px -6px rgba(70,60,48,.4), inset 0 1px 0 rgba(255,255,255,.7);" style-hover="background:linear-gradient(150deg, rgba(247,243,235,.97), rgba(225,219,207,.85)); border-color:rgba(59,55,47,.46);">⚙ settings</button>
      </div>
    </header>

    <div style="flex:1; min-height:0; position:relative;">
    <div ref="{{ scrollRef }}" style="position:absolute; inset:0; overflow:auto;">
    <div style="position:relative; width:{{ spacerW }}; height:{{ spacerH }};">
    <div style="position:absolute; left:0; top:0; width:{{ stageWpx }}; height:{{ stageHpx }}; transform:{{ stageTransform }}; transform-origin:0 0;">
