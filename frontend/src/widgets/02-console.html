

  <!-- CONSOLE -->
  <div style="position:absolute; inset:0; display:flex; flex-direction:column; opacity:{{ consoleOpacity }}; pointer-events:{{ consolePE }}; transition:opacity .9s ease;">

    <header style="display:flex; align-items:center; justify-content:space-between; padding:15px 30px; border-bottom:1px solid rgba(59,55,47,.16); background:linear-gradient(rgba(247,243,235,.55),rgba(244,238,228,.32)); -webkit-backdrop-filter:blur(9px); backdrop-filter:blur(9px);">
      <div style="display:flex; align-items:center; gap:15px; flex-shrink:0;">
        <div onClick="{{ goHome }}" title="live sensor colour — back to home" style="cursor:pointer; width:26px; height:26px; border-radius:7px; background:{{ vesselColor }}; border:1px solid rgba(59,55,47,.28); box-shadow:inset 0 1px 3px rgba(255,255,255,.6); transition:background .12s linear;"></div>
        <div onClick="{{ goHome }}" onMouseEnter="{{ hHome }}" onMouseMove="{{ gshineMove }}" onMouseLeave="{{ logoLeave }}" title="back to home" style="cursor:pointer; display:inline-block; font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; font-size:28px; line-height:1; background:linear-gradient(100deg,#6f8466,#847ea6 52%,#6f8499); -webkit-background-clip:text; background-clip:text; color:transparent;">Phagentic</div>
        <div style="font-family:'JetBrains Mono',monospace; font-size:13px; color:rgba(46,43,36,.55); letter-spacing:.05em; padding-left:15px; border-left:1px solid rgba(59,55,47,.2);">phage&nbsp;therapy&nbsp;·&nbsp;curing&nbsp;antibiotic&nbsp;resistance</div>
      </div>
      <div style="display:flex; align-items:center; gap:20px; flex-shrink:0; margin-left:36px;">
        <div style="display:flex; align-items:center; gap:16px; font-family:'JetBrains Mono',monospace; font-size:14px; color:rgba(46,43,36,.72); white-space:nowrap; flex-shrink:0;">
          <span style="display:inline-flex; align-items:center; gap:7px;"><span style="width:8px; height:8px; border-radius:50%; background:{{ statusDot }}; animation:pulse 2s ease-in-out infinite;"></span>{{ statusTxt }}</span>
          <span style="display:inline-flex; align-items:center; gap:7px;"><span style="width:9px; height:9px; border-radius:50%; background:{{ runColorVal }}; box-shadow:0 0 7px {{ runColorVal }};"></span><b style="font-weight:700; color:#2e2b24;">{{ runNameTxt }}</b></span>
          <span>t&nbsp;{{ clockTxt }}</span>
          <span style="color:{{ sourceColor }};">{{ sourceTxt }}</span>
        </div>
        <div style="display:flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace;">
          <span style="font-size:11.5px; letter-spacing:.1em; color:rgba(46,43,36,.5); margin-right:3px;">TEXT</span>
          <button onClick="{{ zoomOut }}" title="Smaller" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; width:27px; height:27px; font:inherit; font-size:13.5px; color:#2e2b24;" style-hover="background:rgba(59,55,47,.08);">A−</button>
          <button onClick="{{ zoomReset }}" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; padding:0 9px; height:27px; font:inherit; font-size:13px; color:rgba(46,43,36,.72);" style-hover="background:rgba(59,55,47,.08);">{{ zoomTxt }}</button>
          <button onClick="{{ zoomIn }}" title="Larger" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; width:29px; height:27px; font:inherit; font-size:15px; color:#2e2b24;" style-hover="background:rgba(59,55,47,.08);">A+</button>
        </div>
        <button onClick="{{ tidyDesk }}" onMouseEnter="{{ hTidy }}" onMouseLeave="{{ clearHint }}" style="cursor:pointer; background:none; border:none; border-bottom:1.5px solid transparent; padding:4px 1px; font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:.05em; color:rgba(46,43,36,.72);" style-hover="color:#2e2b24; border-bottom-color:#2e2b24;">✦ tidy desk</button>
        <div style="display:flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace;">
          <button onClick="{{ toggleRun }}" onMouseEnter="{{ hPause }}" onMouseLeave="{{ clearHint }}" title="play / pause" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; width:27px; height:27px; font:inherit; font-size:13px; color:#2e2b24; display:inline-flex; align-items:center; justify-content:center;" style-hover="background:rgba(59,55,47,.08);">{{ runIcon }}</button>
          <button onClick="{{ remelt }}" onMouseEnter="{{ hRestart }}" onMouseLeave="{{ clearHint }}" title="restart run" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.25); border-radius:7px; width:27px; height:27px; font:inherit; font-size:15px; color:#2e2b24; display:inline-flex; align-items:center; justify-content:center;" style-hover="background:rgba(59,55,47,.08);">↻</button>
          <button onClick="{{ bump }}" onMouseEnter="{{ hDisturb }}" onMouseLeave="{{ clearHint }}" title="inject disturbance" style="cursor:pointer; background:none; border:1px solid rgba(148,118,47,.4); border-radius:7px; width:27px; height:27px; font:inherit; font-size:15px; color:#94762f; display:inline-flex; align-items:center; justify-content:center;" style-hover="background:rgba(148,118,47,.1);">⟳</button>
        </div>
        <button onClick="{{ openSettings }}" onMouseEnter="{{ hSettings }}" onMouseLeave="{{ clearHint }}" style="cursor:pointer; margin-left:4px; background:linear-gradient(150deg, rgba(247,243,235,.85), rgba(225,219,207,.7)); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border:1px solid rgba(59,55,47,.3); border-radius:9px; padding:8px 14px; font-family:'JetBrains Mono',monospace; font-size:13.5px; letter-spacing:.06em; color:#3b372f; box-shadow:0 4px 12px -6px rgba(70,60,48,.4), inset 0 1px 0 rgba(255,255,255,.7);" style-hover="background:linear-gradient(150deg, rgba(247,243,235,.97), rgba(225,219,207,.85)); border-color:rgba(59,55,47,.46);">⚙ settings</button>
      </div>
    </header>

    <!-- glassy hover hint — appears directly under the hovered control -->
    <div style="position:fixed; left:{{ hintLeft }}; top:{{ hintTop }}; transform:translateX(-50%); z-index:120; pointer-events:none; opacity:{{ hintOpacity }}; transition:opacity .14s ease; background:linear-gradient(150deg, rgba(247,243,235,.92), rgba(228,222,210,.8)); -webkit-backdrop-filter:blur(11px) saturate(1.2); backdrop-filter:blur(11px) saturate(1.2); border:1px solid rgba(255,255,255,.65); border-radius:10px; box-shadow:0 12px 28px -12px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.8); padding:8px 13px; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.4; color:#3b372f; max-width:240px; text-align:center;">{{ hint }}</div>

    <div style="flex:1; min-height:0; position:relative;">
    <div style="position:absolute; inset:0; pointer-events:none; z-index:0; box-shadow:inset 0 0 70px 2px {{ glowColor }}, inset 0 0 200px 44px {{ glowColor2 }}; animation:pulse 8s ease-in-out infinite; transition:box-shadow .6s ease;"></div>
    <div ref="{{ scrollRef }}" style="position:absolute; inset:0; overflow:auto; z-index:1;">
    <div style="position:relative; width:{{ spacerW }}; height:{{ spacerH }};">
    <div style="position:absolute; left:0; top:0; width:{{ stageWpx }}; height:{{ stageHpx }}; transform:{{ stageTransform }}; transform-origin:0 0;">
