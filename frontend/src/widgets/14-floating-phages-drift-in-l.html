
    <!-- floating phages — drift in liquid, pushed by the cursor -->
    <div style="position:absolute; inset:0; z-index:1; pointer-events:none; perspective:1100px;">
      <sc-for list="{{ landingBodies }}" as="b" hint-placeholder-count="4">
        <div style="position:absolute; left:0; top:0; transform:{{ b.tf }}; opacity:{{ b.op }}; filter:drop-shadow(0 18px 26px rgba(90,80,110,.22));">
          <div style="width:0; height:0; transform-style:preserve-3d; transform:rotateX(-18deg); animation:spin3d {{ b.spinS }} linear infinite;">
            <sc-for list="{{ phageFaces }}" as="fc" hint-placeholder-count="20"><div style="position:absolute; left:0; top:0; width:1px; height:1px; transform-origin:0 0; clip-path:polygon(0 0,100% 0,0 100%); background:{{ fc.bg }}; transform:{{ fc.tf }};"></div></sc-for>
            <sc-for list="{{ phageLines }}" as="ln" hint-placeholder-count="40"><div style="position:absolute; left:0; top:0; height:{{ ln.wgt }}; transform-origin:0 50%; border-radius:2px; background:linear-gradient(90deg,rgba(176,184,224,.95),rgba(150,138,196,.9)); width:{{ ln.w }}; transform:{{ ln.t }};"></div></sc-for>
            <sc-for list="{{ phageFibers }}" as="f" hint-placeholder-count="12"><div style="position:absolute; left:0; top:0; height:{{ f.wgt }}; transform-origin:0 50%; border-radius:2px; background:linear-gradient(90deg,rgba(150,165,190,.92),rgba(138,150,188,.78)); width:{{ f.w }}; transform:{{ f.t }};"></div></sc-for>
            <sc-for list="{{ phageDots }}" as="d" hint-placeholder-count="6"><div style="position:absolute; left:0; top:0; width:{{ d.sz }}; height:{{ d.sz }}; margin:{{ d.mg }}; border-radius:50%; background:{{ d.bg }}; box-shadow:{{ d.glow }}; transform:{{ d.t }};"></div></sc-for>
            <div style="position:absolute; left:0; top:0; width:{{ bpRingW }}; height:{{ bpRingW }}; border:1.5px solid rgba(132,126,166,.55); border-radius:50%; transform:{{ bpT }};"></div>
          </div>
        </div>
      </sc-for>
    </div>
    <header style="position:relative; z-index:3; display:flex; align-items:center; justify-content:space-between; padding:30px 44px 30px 64px;">
      <div style="font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; font-size:30px; letter-spacing:.01em; background:linear-gradient(100deg,#6f8466,#847ea6 52%,#6f8499); -webkit-background-clip:text; background-clip:text; color:transparent;">Phagentic</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.16em; color:rgba(46,43,36,.5);">PHAGE&nbsp;FOUNDRY&nbsp;·&nbsp;2026</div>
    </header>
    <div style="position:absolute; inset:0; z-index:2; display:grid; grid-template-columns:1.05fr 1fr; align-items:center;">
      <div style="padding:0 44px 0 64px; max-width:660px;">
        <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.2em; color:#6f7a5c;">A&nbsp;WORLD-MODEL&nbsp;CONTROLLER&nbsp;FOR&nbsp;OSCILLATING&nbsp;REACTIONS</div>
        <h1 style="font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:72px; line-height:1.06; letter-spacing:-.02em; margin:24px 0 0; color:#2e2b24;">
          Every culture<br>has one<br><span style="display:inline-block; padding:.04em .1em .12em; margin-left:-.1em; font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; font-size:84px; line-height:1; background:linear-gradient(100deg,#6f8466,#847ea6 52%,#6f8499); -webkit-background-clip:text; background-clip:text; color:transparent;">perfect moment.</span>
        </h1>
        <div style="margin-top:44px;">
          <button onClick="{{ enter }}" style="cursor:pointer; background:none; border:none; padding:5px 0; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; letter-spacing:.12em; color:#566e4b; border-bottom:2px solid #6f8466;" style-hover="border-bottom-color:#2e2b24;">ENTER THE CONSOLE →</button>
        </div>
      </div>
      <div style="position:relative; height:100%; perspective:1100px;"></div>
    </div>
  </div>
</div>
