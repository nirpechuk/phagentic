

      <!-- (panels above live inside the scroll stage) -->
    </div>
    </div>
    </div>

      <!-- DOCK RAIL (closed tools) — viewport-anchored bottom dock; bobs on scroll -->
      <div ref="{{ dockRef }}" style="position:absolute; left:0; right:0; bottom:12px; display:flex; flex-direction:row; flex-wrap:wrap; justify-content:center; gap:9px; z-index:55; align-items:flex-end; pointer-events:none; transition:transform .28s cubic-bezier(.33,1.08,.68,1);">
        <sc-for list="{{ dockTabs }}" as="d" hint-placeholder-count="1">
          <button onClick="{{ d.h }}" title="open" style="cursor:pointer; pointer-events:auto; display:flex; align-items:center; gap:8px; background:linear-gradient(150deg, rgba(255,254,250,.62), rgba(248,243,234,.34)); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.6); border-radius:999px; box-shadow:0 8px 22px -12px rgba(70,60,48,.5); padding:9px 16px; font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.1em; color:rgba(46,43,36,.72);" style-hover="color:#2e2b24;">
            <span style="width:7px; height:7px; border-radius:2px; background:#6f8466;"></span>{{ d.label }}
          </button>
        </sc-for>
      </div>

    </div>
  </div>
