

      <!-- REACTORS -->
      <sc-if value="{{ panels.reactors.open }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute; left:0; top:0; width:{{ panels.reactors.w }}; height:{{ panels.reactors.h }}; transform:{{ panels.reactors.tf }}; z-index:{{ panels.reactors.z }}; border-radius:20px; background:linear-gradient(150deg, rgba(254,251,246,.72), rgba(247,242,233,.5)); -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3); border:1px solid rgba(255,255,255,.62); box-shadow:0 24px 50px -26px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.85); display:flex; flex-direction:column; overflow:hidden; transition:{{ animTrans }};">
        <div onMouseDown="{{ panels.reactors.resize }}" title="drag to resize" style="position:absolute; right:2px; bottom:2px; width:18px; height:18px; cursor:nwse-resize; z-index:6; border-right:2px solid rgba(59,55,47,.3); border-bottom:2px solid rgba(59,55,47,.3); border-bottom-right-radius:8px;"></div>
        <div onMouseDown="{{ dragH.reactors }}" style="cursor:grab; padding:13px 16px 9px; display:flex; align-items:center; justify-content:space-between;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.18em; color:rgba(46,43,36,.55);">VESSEL</span>
          <button onMouseDown="{{ stopProp }}" onClick="{{ closeH.reactors }}" style="cursor:pointer; background:none; border:none; color:rgba(46,43,36,.4); font-size:15px; line-height:1; padding:2px 4px;" style-hover="color:#2e2b24;">×</button>
        </div>
        <div style="flex:1; min-height:0; padding:6px 18px 16px; display:flex; flex-direction:column;">
          <div style="display:flex; align-items:center; gap:11px; padding:8px 10px; margin-bottom:10px; border-radius:11px; background:rgba(255,255,255,.34); border:1px solid rgba(59,55,47,.12);">
            <div title="raw RGB sensor colour" style="flex:none; width:40px; height:40px; border-radius:9px; background:{{ vesselColor }}; border:1px solid rgba(59,55,47,.2); box-shadow:inset 0 1px 3px rgba(255,255,255,.6); transition:background .12s linear;"></div>
            <div style="flex:1; min-width:0;">
              <div style="font-family:'JetBrains Mono',monospace; font-size:11.5px; color:rgba(46,43,36,.5); letter-spacing:.04em;">TCS34725 · live colour</div>
              <div style="font-family:'JetBrains Mono',monospace; font-size:13px; color:#2e2b24; margin-top:3px;">{{ sensorRgbTxt }}&nbsp;&nbsp;lux {{ sensorLux }}</div>
            </div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; flex:1; min-height:0;">
            <div style="display:flex; flex-direction:column; align-items:center;">
              <div style="display:flex; align-items:center; gap:7px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:#566e4b;"><span style="width:7px; height:7px; border-radius:50%; background:#6f8466;"></span>SOLUTION</div>
              <div style="position:relative; flex:1; width:100%; display:flex; align-items:flex-end; justify-content:center; padding:14px 0;">
                <div style="position:relative; width:78px; height:100%; max-height:150px; border-radius:11px 11px 30px 30px / 8px 8px 46px 46px; overflow:hidden; border:1px solid rgba(59,55,47,.2); background:linear-gradient(118deg, rgba(255,255,255,.45), rgba(255,255,255,.04) 38%, rgba(255,255,255,.18)); box-shadow:{{ oursGlow }}, inset 0 3px 10px rgba(255,255,255,.6), inset 0 -14px 22px rgba(95,115,85,.08);">
                  <div style="position:absolute; left:0; right:0; bottom:0; height:70%; background:{{ vesselColor }}; opacity:.92; transition:background .12s linear;"></div>
                  <div style="position:absolute; left:0; right:0; bottom:0; height:70%; background:linear-gradient(180deg, rgba(255,255,255,.55), transparent 32%); opacity:.6;"></div>
                  <div style="position:absolute; left:9px; top:11px; bottom:36px; width:9px; border-radius:8px; background:linear-gradient(180deg, rgba(255,255,255,.95), transparent); filter:blur(.5px);"></div>
                </div>
              </div>
              <div style="font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:600; line-height:1; color:#2e2b24;">{{ tempOursTxt }}</div>
              <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(46,43,36,.58); margin-top:6px;">phase {{ oursSolidTxt }}</div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center;">
              <div style="display:flex; align-items:center; gap:7px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:rgba(46,43,36,.55);"><span style="width:7px; height:7px; border-radius:50%; background:rgba(46,43,36,.36);"></span>AMPLITUDE</div>
              <div style="position:relative; flex:1; width:100%; display:flex; align-items:flex-end; justify-content:center; padding:14px 0;">
                <div style="position:relative; width:78px; height:100%; max-height:150px; border-radius:11px 11px 30px 30px / 8px 8px 46px 46px; overflow:hidden; border:1px solid rgba(59,55,47,.16); background:linear-gradient(118deg, rgba(255,255,255,.32), rgba(255,255,255,.03) 38%, rgba(255,255,255,.1)); box-shadow:inset 0 3px 10px rgba(255,255,255,.5);">
                  <div style="position:absolute; left:0; right:0; bottom:0; height:70%; background:linear-gradient(180deg,#cbbd9d,#b1a079); opacity:.66;"></div>
                  <div style="position:absolute; left:0; right:0; bottom:0; height:70%; background:linear-gradient(180deg,#e3ddd2,#bdb4a6); opacity:{{ baseCryst }};"></div>
                  <div style="position:absolute; left:9px; top:11px; bottom:36px; width:9px; border-radius:8px; background:linear-gradient(180deg, rgba(255,255,255,.75), transparent); filter:blur(.5px);"></div>
                </div>
              </div>
              <div style="font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:600; line-height:1; color:rgba(46,43,36,.62);">{{ tempBaseTxt }}</div>
              <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(46,43,36,.58); margin-top:6px;">{{ baseSolidTxt }}</div>
            </div>
          </div>
          <div style="margin-top:14px;">
            <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(46,43,36,.55); margin-bottom:7px; display:flex; justify-content:space-between;"><span>live · blue intensity</span><span style="color:#566e4b;">B̂ {{ turbidityTxt }}</span></div>
            <div style="position:relative; height:42px; border-radius:8px; overflow:hidden; border:1px solid rgba(59,55,47,.14); background:repeating-linear-gradient(135deg, rgba(95,115,85,.1) 0 9px, rgba(95,115,85,.03) 9px 18px);">
              <div style="position:absolute; inset:0; background:#cdddda; opacity:{{ turbidity }};"></div>
            </div>
          </div>
        </div>
      </div>
      </sc-if>
