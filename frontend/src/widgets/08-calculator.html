

      <!-- CALCULATOR -->
      <sc-if value="{{ panels.calc.open }}" hint-placeholder-val="{{ true }}">
      <div onMouseDownCapture="{{ panels.calc.front }}" style="position:absolute; left:0; top:0; width:{{ panels.calc.w }}; height:{{ panels.calc.h }}; transform:{{ panels.calc.tf }}; z-index:{{ panels.calc.z }}; border-radius:20px; background:linear-gradient(150deg, rgba(254,251,246,.74), rgba(247,242,233,.52)); -webkit-backdrop-filter:blur(15px) saturate(1.3); backdrop-filter:blur(15px) saturate(1.3); border:1px solid rgba(255,255,255,.64); box-shadow:0 26px 54px -28px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.88); display:flex; flex-direction:column; overflow:hidden; transition:{{ animTrans }};">
        <div onMouseDown="{{ panels.calc.resize }}" title="drag to resize" style="position:absolute; right:2px; bottom:2px; width:18px; height:18px; cursor:nwse-resize; z-index:6; border-right:2px solid rgba(59,55,47,.3); border-bottom:2px solid rgba(59,55,47,.3); border-bottom-right-radius:8px;"></div>
        <div onMouseDown="{{ dragH.calc }}" style="cursor:grab; padding:13px 46px 9px 16px; display:flex; align-items:center; justify-content:space-between;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.18em; color:rgba(46,43,36,.55);">CALCULATOR</span>
          <div style="display:flex; gap:13px; align-items:baseline; font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.12em;">
            <button onMouseDown="{{ stopProp }}" onClick="{{ calcKeysTab }}" style="cursor:pointer; background:none; border:none; padding:0; font:inherit; letter-spacing:.12em; color:{{ calcKeysColor }};">123</button>
            <button onMouseDown="{{ stopProp }}" onClick="{{ calcFxTab }}" style="cursor:pointer; background:none; border:none; padding:0; font:inherit; letter-spacing:.12em; color:{{ calcFxColor }};">ƒx</button>
            <button onMouseDown="{{ stopProp }}" onClick="{{ closeH.calc }}" title="close" style="position:absolute; top:11px; right:13px; z-index:8; cursor:pointer; display:flex; align-items:center; justify-content:center; width:23px; height:23px; padding:0; border-radius:50%; background:rgba(59,55,47,.05); border:1px solid rgba(59,55,47,.12); color:rgba(46,43,36,.45); font-size:14px; line-height:1; transition:background .15s, color .15s, border-color .15s;" style-hover="background:rgba(59,55,47,.13); color:#2e2b24; border-color:rgba(59,55,47,.24);">×</button>
          </div>
        </div>
        <div style="flex:1; min-height:0; padding:4px 14px 14px; display:flex; flex-direction:column;">
          <sc-if value="{{ calcKeysMode }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex; flex-direction:column; flex:1; min-height:0;">
            <div style="display:flex; align-items:center; gap:6px;">
              <button onClick="{{ calcClear }}" style="cursor:pointer; border:1px solid rgba(59,55,47,.14); border-radius:8px; padding:4px 10px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:rgba(46,43,36,.7); background:rgba(59,55,47,.06);">C</button>
              <button onClick="{{ calcBack }}" style="cursor:pointer; border:1px solid rgba(59,55,47,.14); border-radius:8px; padding:4px 10px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:rgba(46,43,36,.7); background:rgba(59,55,47,.06);">⌫</button>
              <div style="flex:1; text-align:right; font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:600; color:#2e2b24; overflow:hidden; white-space:nowrap;">{{ calcDisplay }}</div>
            </div>
            <div style="flex:1; display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; margin-top:10px;">
              <sc-for list="{{ calcKeys }}" as="k" hint-placeholder-count="20"><button onClick="{{ k.h }}" style="cursor:pointer; border:1px solid rgba(59,55,47,.14); border-radius:9px; font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:500; color:{{ k.c }}; background:{{ k.bg }};" style-hover="border-color:rgba(59,55,47,.34);">{{ k.l }}</button></sc-for>
            </div>
          </div>
          </sc-if>
          <sc-if value="{{ eqLibMode }}" hint-placeholder-val="{{ false }}">
          <div style="flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:7px;">
            <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.5); margin:2px 2px 4px;">REACTION EQUATIONS · tap to open</div>
            <sc-for list="{{ eqList }}" as="e" hint-placeholder-count="8">
              <button onMouseDown="{{ stopProp }}" onClick="{{ e.sel }}" style="cursor:pointer; text-align:left; border:1px solid rgba(59,55,47,.13); border-radius:11px; padding:10px 12px; background:rgba(255,255,255,.36);" style-hover="border-color:#6f8466; background:rgba(111,132,102,.12);">
                <div style="font-family:'JetBrains Mono',monospace; font-size:14px; color:#2e2b24;">{{ e.name }}</div>
                <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.5); margin-top:3px;">{{ e.expr }}</div>
              </button>
            </sc-for>
          </div>
          </sc-if>
          <sc-if value="{{ eqDetailMode }}" hint-placeholder-val="{{ false }}">
          <div style="flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column;">
            <div style="display:flex; align-items:center; gap:9px; margin-bottom:8px;">
              <button onMouseDown="{{ stopProp }}" onClick="{{ eqBack }}" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:4px 9px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:rgba(46,43,36,.7);" style-hover="border-color:rgba(59,55,47,.4);">← all</button>
              <span style="font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:#2e2b24;">{{ eqName }}</span>
            </div>
            <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#566e4b; margin-bottom:5px;">{{ eqExpr }}</div>
            <div style="font-size:13.5px; line-height:1.5; color:rgba(46,43,36,.7); margin-bottom:13px;">{{ eqDesc }}</div>
            <sc-if value="{{ eqNormal }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex; flex-direction:column; gap:9px;">
              <sc-for list="{{ eqFields }}" as="fd" hint-placeholder-count="2">
                <div style="display:flex; align-items:center; gap:10px;">
                  <span style="flex:none; width:92px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:rgba(46,43,36,.7);">{{ fd.label }}</span>
                  <input type="number" value="{{ fd.val }}" onMouseDown="{{ stopProp }}" onInput="{{ fd.h }}" style="flex:1; min-width:0; background:rgba(255,255,255,.55); border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:8px 10px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#2e2b24; outline:none;" />
                  <span style="flex:none; width:64px; font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.5);">{{ fd.unit }}</span>
                </div>
              </sc-for>
            </div>
            <div style="display:flex; align-items:baseline; justify-content:space-between; margin-top:16px; border-top:1px solid rgba(59,55,47,.12); padding-top:13px;">
              <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(46,43,36,.55);">result</span>
              <span><span style="font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:600; color:#2e2b24;">{{ eqResult }}</span>&nbsp;<span style="font-family:'JetBrains Mono',monospace; font-size:13px; color:rgba(46,43,36,.55);">{{ eqUnit }}</span></span>
            </div>
            </sc-if>
            <sc-if value="{{ eqConv }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex; align-items:flex-end; gap:12px;">
              <div style="flex:1;">
                <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.55); margin-bottom:5px;">Celsius °C</div>
                <input type="number" value="{{ eqTempC }}" onMouseDown="{{ stopProp }}" onInput="{{ setTempC }}" style="width:100%; background:rgba(255,255,255,.55); border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:9px 10px; font-family:'JetBrains Mono',monospace; font-size:15px; color:#2e2b24; outline:none;" />
              </div>
              <span style="font-family:'JetBrains Mono',monospace; font-size:16px; color:rgba(46,43,36,.4); padding-bottom:9px;">⇄</span>
              <div style="flex:1;">
                <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.55); margin-bottom:5px;">Fahrenheit °F</div>
                <input type="number" value="{{ eqTempF }}" onMouseDown="{{ stopProp }}" onInput="{{ setTempF }}" style="width:100%; background:rgba(255,255,255,.55); border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:9px 10px; font-family:'JetBrains Mono',monospace; font-size:15px; color:#2e2b24; outline:none;" />
              </div>
            </div>
            </sc-if>
            <sc-if value="{{ eqPhage }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex; flex-direction:column; gap:13px;">
              <div style="display:flex; align-items:center; gap:12px;">
                <div style="flex:none; width:54px; height:54px; border-radius:12px; background:{{ phageSwatch }}; border:1px solid rgba(59,55,47,.2); box-shadow:inset 0 1px 2px rgba(255,255,255,.6);"></div>
                <div style="display:flex; flex-direction:column; gap:3px;">
                  <span style="font-family:'JetBrains Mono',monospace; font-size:13.5px; color:#2e2b24;">≈ {{ phagePrettyTxt }} phages</span>
                  <span style="font-family:'JetBrains Mono',monospace; font-size:11.5px; color:rgba(46,43,36,.5);">{{ phageRgbTxt }}</span>
                </div>
              </div>
              <div>
                <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:11px; color:rgba(46,43,36,.55); margin-bottom:6px;"><span>clear</span><span>deep blue</span></div>
                <input type="range" min="0" max="10" step="0.01" value="{{ phageSliderVal }}" onMouseDown="{{ stopProp }}" onInput="{{ setPhageSlider }}" style="width:100%; accent-color:#5f7fb0; cursor:pointer;" />
              </div>
              <div style="display:flex; align-items:flex-end; gap:12px;">
                <div style="flex:none; width:118px;">
                  <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.55); margin-bottom:5px;">Slider 0–10</div>
                  <input type="number" min="0" max="10" step="0.01" value="{{ phageSliderStr }}" onMouseDown="{{ stopProp }}" onInput="{{ setPhageSlider }}" style="width:100%; background:rgba(255,255,255,.55); border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:9px 10px; font-family:'JetBrains Mono',monospace; font-size:15px; color:#2e2b24; outline:none;" />
                </div>
                <span style="font-family:'JetBrains Mono',monospace; font-size:16px; color:rgba(46,43,36,.4); padding-bottom:9px;">⇄</span>
                <div style="flex:1; min-width:0;">
                  <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(46,43,36,.55); margin-bottom:5px;">Phage count</div>
                  <input type="number" min="0" value="{{ phageCountVal }}" onMouseDown="{{ stopProp }}" onInput="{{ setPhageCount }}" style="width:100%; background:rgba(255,255,255,.55); border:1px solid rgba(59,55,47,.2); border-radius:8px; padding:9px 10px; font-family:'JetBrains Mono',monospace; font-size:15px; color:#2e2b24; outline:none;" />
                </div>
              </div>
            </div>
            </sc-if>
            <button onMouseDown="{{ stopProp }}" onClick="{{ eqClear }}" style="cursor:pointer; align-self:flex-start; margin-top:16px; background:rgba(59,55,47,.06); border:1px solid rgba(59,55,47,.16); border-radius:8px; padding:7px 14px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:rgba(46,43,36,.7);" style-hover="border-color:rgba(59,55,47,.36);">clear</button>
          </div>
          </sc-if>
        </div>
      </div>
      </sc-if>
