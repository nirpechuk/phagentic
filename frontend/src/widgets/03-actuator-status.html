

      <!-- ACTUATOR STATUS (read-only — shows what the controller is doing) -->
      <sc-if value="{{ panels.actuators.open }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute; left:0; top:0; width:{{ panels.actuators.w }}; height:{{ panels.actuators.h }}; transform:{{ panels.actuators.tf }}; z-index:{{ panels.actuators.z }}; border-radius:20px; background:linear-gradient(150deg, rgba(254,251,246,.72), rgba(247,242,233,.5)); -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3); border:1px solid rgba(255,255,255,.62); box-shadow:0 24px 50px -26px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.85); display:flex; flex-direction:column; overflow:hidden; transition:{{ animTrans }};">
        <div onMouseDown="{{ panels.actuators.resize }}" title="drag to resize" style="position:absolute; right:2px; bottom:2px; width:18px; height:18px; cursor:nwse-resize; z-index:6; border-right:2px solid rgba(59,55,47,.3); border-bottom:2px solid rgba(59,55,47,.3); border-bottom-right-radius:8px;"></div>
        <div onMouseDown="{{ dragH.actuators }}" style="cursor:grab; padding:13px 46px 9px 18px; display:flex; align-items:center; justify-content:space-between;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.18em; color:rgba(46,43,36,.55);">ACTUATORS</span>
          <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; color:{{ actPolicyColor }};">{{ actPolicyTxt }}</span>
            <button onMouseDown="{{ stopProp }}" onClick="{{ closeH.actuators }}" title="close" style="position:absolute; top:11px; right:13px; z-index:8; cursor:pointer; display:flex; align-items:center; justify-content:center; width:23px; height:23px; padding:0; border-radius:50%; background:rgba(59,55,47,.05); border:1px solid rgba(59,55,47,.12); color:rgba(46,43,36,.45); font-size:14px; line-height:1; transition:background .15s, color .15s, border-color .15s;" style-hover="background:rgba(59,55,47,.13); color:#2e2b24; border-color:rgba(59,55,47,.24);">×</button>
          </div>
        </div>
        <div style="flex:1; min-height:0; overflow-y:auto; padding:6px 18px 16px; display:flex; flex-direction:column; gap:14px;">

          <!-- STIRRER (PWM) -->
          <div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; font-family:'JetBrains Mono',monospace; margin-bottom:6px;">
              <span style="font-size:12px; color:rgba(46,43,36,.7);">{{ stirName }} <span style="opacity:.5; font-size:9.5px;">mixer</span></span>
              <span><b style="font-size:13px; font-weight:700; color:#5f7fb0; letter-spacing:.08em;">{{ actStirLevel }}</b> <span style="font-size:13px; font-weight:600; color:#2e2b24;">{{ actStirPct }}</span></span>
            </div>
            <div style="position:relative; height:10px; border-radius:6px; overflow:hidden; background:rgba(59,55,47,.1);">
              <div style="position:absolute; left:0; top:0; bottom:0; width:{{ actStirW }}; background:linear-gradient(90deg,#7aa0d8,#5f7fb0); box-shadow:0 0 12px rgba(95,127,176,.5); transition:width .25s ease;"></div>
            </div>
          </div>

          <!-- LIGHT (PWM) -->
          <div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; font-family:'JetBrains Mono',monospace; margin-bottom:6px;">
              <span style="font-size:12px; color:rgba(46,43,36,.7);">{{ lightName }} <span style="opacity:.5; font-size:9.5px;">sensor light</span></span>
              <span style="font-size:13px; font-weight:600; color:#2e2b24;">{{ actLightPct }}</span>
            </div>
            <div style="position:relative; height:10px; border-radius:6px; overflow:hidden; background:rgba(59,55,47,.1);">
              <div style="position:absolute; left:0; top:0; bottom:0; width:{{ actLightW }}; background:linear-gradient(90deg,#e7c96b,#b9923a); box-shadow:0 0 12px rgba(231,201,107,.45); transition:width .25s ease;"></div>
            </div>
          </div>

          <!-- PUMPS (digital) -->
          <div style="display:flex; gap:12px;">
            <div style="flex:1; display:flex; align-items:center; justify-content:space-between; padding:11px 13px; border-radius:12px; background:{{ actGluBg }}; border:1px solid rgba(59,55,47,.16); transition:background .2s ease;">
              <span style="font-family:'JetBrains Mono',monospace; font-size:11.5px; color:{{ actGluColor }};">{{ gluName }}</span>
              <b style="font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; letter-spacing:.1em; color:{{ actGluColor }};">{{ actGluTxt }}</b>
            </div>
            <div style="flex:1; display:flex; align-items:center; justify-content:space-between; padding:11px 13px; border-radius:12px; background:{{ actNaohBg }}; border:1px solid rgba(59,55,47,.16); transition:background .2s ease;">
              <span style="font-family:'JetBrains Mono',monospace; font-size:11.5px; color:{{ actNaohColor }};">{{ naohName }}</span>
              <b style="font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; letter-spacing:.1em; color:{{ actNaohColor }};">{{ actNaohTxt }}</b>
            </div>
          </div>

          <div style="border-top:1px solid rgba(59,55,47,.12); padding-top:10px; display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:rgba(46,43,36,.55);">
            <span>glucose pulses this run</span><b style="font-weight:700; color:#2e2b24;">{{ actGluPulses }}</b>
          </div>

        </div>
      </div>
      </sc-if>
