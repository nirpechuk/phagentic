

  <!-- SETTINGS · BLUETOOTH -->
  <sc-if value="{{ settingsOpen }}" hint-placeholder-val="{{ false }}">
  <div onClick="{{ closeSettings }}" style="position:absolute; inset:0; z-index:90; display:flex; align-items:center; justify-content:center; background:rgba(46,43,36,.3); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);">
    <div onClick="{{ stopProp }}" style="width:440px; max-width:92%; border-radius:18px; background:linear-gradient(150deg, rgba(254,251,246,.97), rgba(247,242,233,.93)); border:1px solid rgba(255,255,255,.7); box-shadow:0 40px 80px -30px rgba(70,60,48,.6); padding:22px 24px; color:#2e2b24;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;">
        <span style="font-family:'JetBrains Mono',monospace; font-size:13.5px; letter-spacing:.18em; color:rgba(46,43,36,.6);">SETTINGS · BLUETOOTH</span>
        <button onClick="{{ closeSettings }}" style="cursor:pointer; background:none; border:none; color:rgba(46,43,36,.4); font-size:18px; line-height:1;" style-hover="color:#2e2b24;">×</button>
      </div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(46,43,36,.55); margin-bottom:6px;">DEVICE NAME</div>
      <input value="{{ bleName }}" onInput="{{ setBleName }}" placeholder="Bioreactor" style="width:100%; background:rgba(255,255,255,.6); border:1px solid rgba(59,55,47,.2); border-radius:10px; padding:10px 12px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#2e2b24; outline:none; margin-bottom:14px;" />
      <div style="display:flex; gap:9px; margin-bottom:16px;">
        <button onClick="{{ bleConnect }}" style="cursor:pointer; flex:1; background:#6f8466; border:none; border-radius:10px; padding:11px; font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:#fbf8f2;" style-hover="background:#566e4b;">{{ bleLabel }}</button>
        <button onClick="{{ bleReconnect }}" title="Reconnect to a previously-granted device without prompting" style="cursor:pointer; background:rgba(111,132,102,.14); border:1px solid rgba(111,132,102,.34); border-radius:10px; padding:11px 14px; font-family:'JetBrains Mono',monospace; font-size:14px; color:#566e4b;" style-hover="background:rgba(111,132,102,.24);">reconnect</button>
        <button onClick="{{ bleDisconnect }}" style="cursor:pointer; background:none; border:1px solid rgba(59,55,47,.22); border-radius:10px; padding:11px 14px; font-family:'JetBrains Mono',monospace; font-size:14px; color:rgba(46,43,36,.7);" style-hover="border-color:rgba(59,55,47,.4);">disconnect</button>
      </div>
      <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:13px; color:rgba(46,43,36,.6); border-top:1px solid rgba(59,55,47,.12); padding-top:12px;">
        <span>status</span><span style="color:{{ sourceColor }};">{{ bleStateTxt }}</span>
      </div>
      <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(46,43,36,.5); margin-top:6px;">
        <span>{{ bleKnownTxt }}</span><span>{{ sourceTxt }}</span>
      </div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:#94762f; margin-top:12px; line-height:1.5;">{{ bleSupTxt }}</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:11.5px; color:rgba(46,43,36,.45); margin-top:10px; line-height:1.6;">Pairs directly with the ESP32 over the Nordic UART Service — no Python hub needed. The first connect needs one click to grant the device; after that the app reconnects on its own.</div>
    </div>
  </div>
  </sc-if>
