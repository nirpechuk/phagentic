

      <!-- NARRATION -->
      <sc-if value="{{ panels.narr.open }}" hint-placeholder-val="{{ true }}">
      <div onMouseDownCapture="{{ panels.narr.front }}" style="position:absolute; left:0; top:0; width:{{ panels.narr.w }}; height:{{ panels.narr.h }}; transform:{{ panels.narr.tf }}; z-index:{{ panels.narr.z }}; border-radius:20px; background:linear-gradient(150deg, rgba(254,251,246,.72), rgba(247,242,233,.5)); -webkit-backdrop-filter:blur(14px) saturate(1.3); backdrop-filter:blur(14px) saturate(1.3); border:1px solid rgba(255,255,255,.62); box-shadow:0 24px 50px -26px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.85); display:flex; flex-direction:column; overflow:hidden; transition:{{ animTrans }};">
        <div onMouseDown="{{ panels.narr.resize }}" title="drag to resize" style="position:absolute; right:2px; bottom:2px; width:18px; height:18px; cursor:nwse-resize; z-index:6; border-right:2px solid rgba(59,55,47,.3); border-bottom:2px solid rgba(59,55,47,.3); border-bottom-right-radius:8px;"></div>
        <div onMouseDown="{{ dragH.narr }}" style="cursor:grab; padding:13px 18px 9px; display:flex; align-items:center; justify-content:space-between;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.18em; color:rgba(46,43,36,.55);">NARRATION</span>
          <button onMouseDown="{{ stopProp }}" onClick="{{ closeH.narr }}" title="close" style="position:absolute; top:11px; right:13px; z-index:8; cursor:pointer; display:flex; align-items:center; justify-content:center; width:23px; height:23px; padding:0; border-radius:50%; background:rgba(59,55,47,.05); border:1px solid rgba(59,55,47,.12); color:rgba(46,43,36,.45); font-size:14px; line-height:1; transition:background .15s, color .15s, border-color .15s;" style-hover="background:rgba(59,55,47,.13); color:#2e2b24; border-color:rgba(59,55,47,.24);">×</button>
        </div>
        <div style="padding:6px 18px 14px; border-bottom:1px solid rgba(59,55,47,.12);">
          <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; color:rgba(46,43,36,.55);">oscillations</div>
          <div style="display:flex; align-items:baseline; gap:11px; margin-top:6px;">
            <span style="font-family:'JetBrains Mono',monospace; font-size:42px; font-weight:700; line-height:.92; color:#566e4b;">{{ rewardTxt }}</span>
            <span style="font-family:'JetBrains Mono',monospace; font-size:14px; color:#94762f;">{{ lastYieldTxt }}</span>
          </div>
        </div>
        <div style="flex:1; min-height:0; overflow-y:auto; padding:14px 18px; display:flex; flex-direction:column; gap:14px;">
          <sc-for list="{{ narrFeed }}" as="m" hint-placeholder-count="6">
            <div style="display:flex; gap:11px;">
              <span style="margin-top:6px; flex:none; width:6px; height:6px; border-radius:50%; background:{{ m.color }};"></span>
              <span style="font-size:{{ m.size }}; line-height:1.5; color:{{ m.color }}; font-weight:{{ m.weight }};">{{ m.txt }}</span>
            </div>
          </sc-for>
        </div>
      </div>
      </sc-if>
