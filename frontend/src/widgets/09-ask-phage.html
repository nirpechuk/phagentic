

      <!-- ASK PHAGE -->
      <sc-if value="{{ panels.ask.open }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute; left:0; top:0; width:{{ panels.ask.w }}; height:{{ panels.ask.h }}; transform:{{ panels.ask.tf }}; z-index:{{ panels.ask.z }}; border-radius:20px; background:linear-gradient(150deg, rgba(254,251,246,.74), rgba(247,242,233,.52)); -webkit-backdrop-filter:blur(15px) saturate(1.3); backdrop-filter:blur(15px) saturate(1.3); border:1px solid rgba(255,255,255,.64); box-shadow:0 26px 54px -28px rgba(70,60,48,.5), inset 0 1px 0 rgba(255,255,255,.88); display:flex; flex-direction:column; overflow:hidden; transition:{{ animTrans }};">
        <div onMouseDown="{{ panels.ask.resize }}" title="drag to resize" style="position:absolute; right:2px; bottom:2px; width:18px; height:18px; cursor:nwse-resize; z-index:6; border-right:2px solid rgba(59,55,47,.3); border-bottom:2px solid rgba(59,55,47,.3); border-bottom-right-radius:8px;"></div>
        <div onMouseDown="{{ dragH.ask }}" style="cursor:grab; padding:13px 20px 9px; display:flex; align-items:center; justify-content:space-between;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.18em; color:rgba(46,43,36,.55);">ASK PHAGE</span>
          <button onMouseDown="{{ stopProp }}" onClick="{{ closeH.ask }}" title="close" style="position:absolute; top:11px; right:13px; z-index:8; cursor:pointer; display:flex; align-items:center; justify-content:center; width:23px; height:23px; padding:0; border-radius:50%; background:rgba(59,55,47,.05); border:1px solid rgba(59,55,47,.12); color:rgba(46,43,36,.45); font-size:14px; line-height:1; transition:background .15s, color .15s, border-color .15s;" style-hover="background:rgba(59,55,47,.13); color:#2e2b24; border-color:rgba(59,55,47,.24);">×</button>
        </div>
        <div ref="{{ chatRef }}" style="flex:1; min-height:0; overflow-y:auto; padding:8px 20px; display:flex; flex-direction:column; gap:11px;">
          <sc-for list="{{ chatMsgs }}" as="c" hint-placeholder-count="2">
            <div ref="{{ c.mref }}" style="align-self:{{ c.align }}; max-width:82%; background:{{ c.bg }}; color:{{ c.color }}; border-radius:14px; padding:9px 14px; font-size:13.5px; line-height:1.5; overflow-wrap:anywhere;"></div>
          </sc-for>
        </div>
        <div style="padding:8px 16px 12px;">
          <div style="display:flex; gap:9px; align-items:center;">
            <input value="{{ chatInput }}" onMouseDown="{{ stopProp }}" onInput="{{ setChatInput }}" onKeyDown="{{ chatKey }}" placeholder="Ask about this run…" style="flex:1; background:rgba(255,255,255,.45); border:1px solid rgba(59,55,47,.2); border-radius:11px; padding:11px 14px; font-size:13.5px; color:#2e2b24; outline:none;" />
            <button onMouseDown="{{ stopProp }}" onClick="{{ sendChat }}" style="cursor:pointer; border:none; border-radius:11px; padding:11px 17px; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:#fbf8f2; background:#6f8466;" style-hover="background:#566e4b;">send</button>
          </div>
        </div>
      </div>
      </sc-if>
