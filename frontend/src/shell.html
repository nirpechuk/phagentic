<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PHAGENTIC · closed-loop phage controller</title>
<script src="./api.js"></script>
<script src="./logic.js"></script>
<script src="./runtime.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#ece4d6; }
  body{ font-family:'Space Grotesk',sans-serif; -webkit-font-smoothing:antialiased; }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-thumb{ background:rgba(59,55,47,.24); border-radius:5px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  input{ font-family:inherit; }
  input[type=number]::-webkit-inner-spin-button{ opacity:.35; }
  @keyframes spin3d{ from{ transform:rotateY(0deg);} to{ transform:rotateY(360deg);} }
  @keyframes bob{ 0%,100%{ transform:translateY(-9px);} 50%{ transform:translateY(9px);} }
  @keyframes drift1{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(4%,-3%) scale(1.1);} }
  @keyframes drift2{ 0%,100%{ transform:translate(0,0) scale(1.04);} 50%{ transform:translate(-5%,4%) scale(1);} }
  @keyframes drift3{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(3%,5%) scale(1.12);} }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
</style>
</helmet>
<!--@WIDGETS-->
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:820},&quot;watercolor&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:0.85,&quot;min&quot;:0,&quot;max&quot;:1,&quot;step&quot;:0.05,&quot;tsType&quot;:&quot;number&quot;},&quot;simSpeed&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;min&quot;:0.4,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;},&quot;palette&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Meadow&quot;,&quot;options&quot;:[&quot;Meadow&quot;,&quot;Clay&quot;,&quot;Mist&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
var Component = window.PhagenticComponent(DCLogic, StreamableLogic, React);
</script>
</body>
</html>
